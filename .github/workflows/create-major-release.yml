name: Update Major Release Tag

on:
  release:
    types: [published, created]

permissions:
  contents: write

jobs:
  movetag:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Exit if manual test release
        id: exit_if_manual_test_release
        if: contains(github.event.release.tag_name, '-test')
        run: |
          echo "This is a test release, skipping tag update."
          echo "skipping=true" >> $GITHUB_OUTPUT

      - name: Get major version num and update tag
        if: steps.exit_if_manual_test_release.outputs.skipping != 'true'
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          MAJOR=${VERSION%%.*}
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git tag -fa "${MAJOR}" -m "Update major version tag to point at ${GITHUB_REF}"
          git push origin "${MAJOR}" --force
