name: Test Create PR and Create Release Notes Actions

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - '**/action.yml'

permissions:
  contents: write
  pull-requests: write

jobs:
  manual-tests:
    runs-on: ubuntu-latest
    outputs:
      pull-request-url: ${{ steps.create_pr.outputs.pull-request-url }}
      pull-request-number: ${{ steps.create_pr.outputs.pull-request-number }}
      release-branch: ${{ env.RELEASE_BRANCH }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Fetch all history for all branches and tags

      - name: Generate a unique release branch name
        id: generate_branch_name
        run: |
          export RELEASE_BRANCH="releases/v$(date +%s)"
          echo "RELEASE_BRANCH=$RELEASE_BRANCH" >> $GITHUB_ENV
      
      - name: Create files and commits
        run: |
          git checkout -b ${{ env.RELEASE_BRANCH }} 
          git config user.name "Test User"
          git config user.email "testuser@example.com"
          echo "dummy content" > OVP1234.txt
          git add OVP1234.txt && git commit -m "OVP-1234: Add dummy file for testing"
          echo "dummy content" > OVP5678.txt
          git add OVP5678.txt && git commit -m "OVP-5678: Add another dummy file for testing"
          git push origin HEAD:${{ env.RELEASE_BRANCH }}
          
      - name: Run create-pr action
        id: create_pr
        uses: ./create-pr
        with:
          base-branch: "main"
          target-branch: ${{ env.RELEASE_BRANCH }}
          github-token: ${{ secrets.PAT }}

      - name: Run create-release-notes action
        uses: ./create-release-notes
        with:
          base-branch: "origin/main"
          release-branch: "origin/${{ env.RELEASE_BRANCH }}"
          confluence-space: "kaisunraj"
          github-token: ${{ secrets.PAT }}

      - name: Set output variables for teardown
        id: set_outputs
        run: |
          echo "pull-request-url=${{ steps.create_pr.outputs.pull-request-url }}" >> $GITHUB_OUTPUT
          echo "pull-request-number=${{ steps.create_pr.outputs.pull-request-number }}" >> $GITHUB_OUTPUT
          echo "release-branch=${{ env.RELEASE_BRANCH }}" >> $GITHUB_OUTPUT
    
  teardown:
    runs-on: ubuntu-latest
    needs: manual-tests
    environment: manual-testing
    steps:
      - name: Close created PR
        run: |
          curl -X PATCH \
            -H "Authorization: token ${{ secrets.PAT }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository_owner }}/${{ github.event.repository.name }}/pulls/${{ needs.manual-tests.outputs.pull-request-number }} \
            -d '{"state": "closed"}'
      
      - name: Delete created branch
        run: |
          curl -X DELETE \
            -H "Authorization: token ${{ secrets.PAT }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository_owner }}/${{ github.event.repository.name }}/git/refs/heads/${{ needs.manual-tests.outputs.release-branch }}

      - name: Delete release tag
        run: |
          curl -X DELETE \
            -H "Authorization: token ${{ secrets.PAT }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository_owner }}/${{ github.event.repository.name }}/git/refs/tags/${{ needs.manual-tests.outputs.release-branch }}