name: Validate PR Labels

on:
  pull_request:
    types:
        - opened
        - reopened
        - synchronize
        - labeled
        - unlabeled
        - ready_for_review

jobs:
  require-at-least-one-label:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    steps:
      - name: Ensure PR has at least one label
        uses: actions/github-script@v7
        with:
          script: |
            const labels = context.payload.pull_request?.labels || [];

            if (labels.length === 0) {
                core.setFailed("PR must have at least one label.");
                return;
            }

            core.info(`PR has ${labels.length} label(s): ${labels.map(l => l.name).join(", ")}`);