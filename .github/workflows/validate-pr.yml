name: Validate PR Labels

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - labeled
      - unlabeled
      - ready_for_review

jobs:
  require-at-least-one-label:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    steps:
      - name: Ensure PR has at least one label
        uses: actions/github-script@v7
        with:
          script: |
            const mandatoryLabels = ["major", "minor", "patch"];
            const labels = context.payload.pull_request?.labels || [];
            const hasMandatoryLabel = labels.some(label => mandatoryLabels.includes(label.name));

            if (!hasMandatoryLabel) {
                core.setFailed("PR must have at least one mandatory label: major, minor, or patch.");
                return;
            }

            core.info(`PR has ${labels.length} label(s): ${labels.map(l => l.name).join(", ")}`);
      
  run-unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "24"
      - name: Install dependencies
        run: npm ci
      - name: Run unit tests
        run: npm test
